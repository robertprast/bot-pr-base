name: Close External PRs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            core.notice(`PR author is ${author}`);

            if (author === 'github-actions[bot]') {
              core.notice(`${author} matched bot exemption - allowing PR`);
              return;
            }

            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: author,
            });

            if (['admin', 'write'].includes(data.permission)) {
              core.notice(`${author} has ${data.permission} access - allowing PR`);
              return;
            }

            core.notice(`${author} has ${data.permission} access - closing PR`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: 'Closed by safe PoC workflow because author is external.',
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed',
            });
